<!-- index.html -->
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fußballturnier</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <h1>Fußballturnier</h1>
  <button id="logoutBtn" class="hidden" onclick="logout()">Logout</button>
</header>

<main>
  <!-- Login / Registrierung -->
  <section id="loginSection">
    <h2>Login</h2>
    <input id="username" placeholder="Benutzername">
    <input id="password" type="password" placeholder="Passwort">
    
<section id="teamAssign" class="hidden">
  <h2>Team auswählen</h2>
  <select id="assignTeam"></select>
  <button onclick="assignTeam()">Team beitreten</button>
</section>

    <button onclick="login()">Login</button>
    <p id="loginMsg"></p>

    <h3>Registrieren</h3>
    <input id="regUser" placeholder="Neuer Benutzername">
    <input id="regPass" type="password" placeholder="Neues Passwort">
    <button onclick="register()">Registrieren</button>
  </section>

  <!-- Turnier -->
  <section id="tournamentSection" class="hidden">
    <h2>Turnierverwaltung</h2>
    <input id="turnierName" placeholder="Turniername">
    <select id="turnierModus">
      <option value="gruppe">Gruppen</option>
      <option value="ko">KO</option>
    </select>
    <button onclick="createTournament()">Turnier anlegen</button>
    <ul id="tournamentList"></ul>
  </section>

  <!-- Teams -->
  <section id="teamSection" class="hidden">
    <h2>Teams</h2>
    <input id="teamName" placeholder="Teamname">
    <button onclick="addTeam()">Team hinzufügen</button>
    <ul id="teamList"></ul>
  </section>

  <!-- Spiele -->
  <section id="gameSection" class="hidden">
    <h2>Spiele</h2>
    <button onclick="generateGames()">Spielplan erstellen</button>
    <ul id="gameList"></ul>
  </section>

  <!-- Ranking -->
  <section id="rankingSection" class="hidden">
    <h2>Ranking</h2>
    <table>
      <thead>
        <tr>
          <th>Team</th><th>S</th><th>U</th><th>N</th>
          <th>T</th><th>GT</th><th>Diff</th><th>P</th>
        </tr>
      </thead>
      <tbody id="rankingBody"></tbody>
    </table>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
